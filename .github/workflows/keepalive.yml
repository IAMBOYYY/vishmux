name: Keep VISHMUX Render Server Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -sf https://YOUR-RENDER-URL.onrender.com/health || echo "Ping failed (probably cold start) — not treating as a failure"
